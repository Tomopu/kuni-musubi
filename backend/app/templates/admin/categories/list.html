{% extends "admin/base.html" %}

{% block title %}カテゴリ管理 - KM Admin{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fs-4 fw-bold mb-0">カテゴリ管理</h2>
  <a href="/admin/categories/new" class="btn btn-primary btn-sm">新規作成</a>
</div>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th style="width: 70px;">表示順</th>
          <th>名前</th>
          <th style="width: 180px;">スラッグ</th>
          <th style="width: 120px;">操作</th>
        </tr>
      </thead>
      <tbody>
        {% for category in categories %}
        <tr>
          <td class="text-center">{{ category.display_order }}</td>
          <td>{{ category.name }}</td>
          <td><code>{{ category.slug }}</code></td>
          <td class="text-nowrap">
            <a href="/admin/categories/{{ category.id }}/edit" class="btn btn-outline-primary btn-sm">編集</a>
            <form action="/admin/categories/{{ category.id }}/delete" method="post" class="d-inline"
                  onsubmit="return confirm('このカテゴリを削除してもよいですか？');">
              <button type="submit" class="btn btn-outline-danger btn-sm">削除</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="4" class="text-center text-muted py-4">カテゴリがありません</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
